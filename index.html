<!-- almacenamiento real del navegador (reemplaza window.storage de Claude) -->
<script>
(function () {
  if (window.storage) return;
  var ls = window.localStorage;
  window.storage = {
    get: function (k) { var v = ls.getItem(k); return Promise.resolve(v == null ? null : { key: k, value: v, shared: false }); },
    set: function (k, v) { ls.setItem(k, v); return Promise.resolve({ key: k, value: v, shared: false }); },
    "delete": function (k) { ls.removeItem(k); return Promise.resolve({ key: k, deleted: true, shared: false }); },
    list: function (p) { p = p || ""; var keys = Object.keys(ls).filter(function (x) { return x.indexOf(p) === 0; }); return Promise.resolve({ keys: keys, prefix: p, shared: false }); }
  };
})();
</script>

<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef, useCallback, useContext } from "react";
import {
  Plus, Trash2, X, Check, Circle, CheckCircle2, ListChecks, BarChart3,
  CalendarDays, StickyNote, Link2, Lightbulb, ArrowRight, SlidersHorizontal,
  FolderOpen, Menu, ChevronLeft, ExternalLink, Pencil, Cloud, CloudOff,
  AlertTriangle, User, Flag, Users, Copy, Home as HomeIcon, CalendarClock,
  Download, Upload, Search,
} from "lucide-react";

/* ------------------------------------------------------------------ *
 *  Seguimiento de proyectos — single-file artifact
 * ------------------------------------------------------------------ */

const STORAGE_KEY = "tracker:v1";

// Contexto para mostrar avisos breves (toasts) desde cualquier componente
const ToastContext = React.createContext(null);

const ACCENTS = ["#b04a2f", "#6f7a52", "#2f6f7a", "#8a5a2f", "#7a2f5a", "#3f5a8a"];

const SECTIONS = [
  { key: "tasks", label: "Current Tasks", icon: ListChecks },
  { key: "meetings", label: "Meetings", icon: CalendarDays },
  { key: "progress", label: "Progress", icon: BarChart3 },
  { key: "notes", label: "Notes", icon: StickyNote },
  { key: "links", label: "Links", icon: Link2 },
  { key: "decisions", label: "Decisions", icon: Lightbulb },
  { key: "nextSteps", label: "Future Tasks", icon: ArrowRight },
  { key: "risks", label: "Risks", icon: AlertTriangle },
];

const STATUSES = ["Sin empezar", "En curso", "En pausa", "Bloqueado", "Hecho"];

// Niveles de urgencia / impacto (H/M/L) reutilizados en Tasks y Risks
const LEVELS = {
  H: { label: "H", color: "#b3331f", bg: "#f4e0db" },
  M: { label: "M", color: "#94701a", bg: "#f1e7cf" },
  L: { label: "L", color: "#5d6a44", bg: "#e6ebda" },
};
const cycleLevel = (l) => (l === "H" ? "M" : l === "M" ? "L" : "H");

const uid = () =>
  (typeof crypto !== "undefined" && crypto.randomUUID)
    ? crypto.randomUUID()
    : Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

const today = () => new Date().toISOString().slice(0, 10);

// Días enteros desde hoy hasta una fecha YYYY-MM-DD (negativo = vencida)
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.round((d - now) / 86400000);
}

const ALIGN_LABEL = {
  tasks: "Current Task", progressLog: "Progress", progressSummary: "Progress",
  meetings: "Meeting", notes: "Notes", links: "Link",
  decisions: "Decision", nextSteps: "Future Task", risks: "Risk",
};
const ALIGN_ICON = {
  tasks: ListChecks, progressLog: BarChart3, progressSummary: BarChart3,
  meetings: CalendarDays, notes: StickyNote, links: Link2,
  decisions: Lightbulb, nextSteps: ArrowRight, risks: AlertTriangle,
};

// Reúne todos los elementos marcados para alinear con Maxine, agrupables por proyecto
function collectAligned(projects) {
  const out = [];
  for (const p of projects) {
    const base = { projectId: p.id, projectName: p.name, accent: p.accent };
    (p.tasks || []).filter((t) => t.aligned).forEach((t) =>
      out.push({ ...base, section: "tasks", itemId: t.id, primary: t.text, level: t.level, due: t.due, done: !!t.alignDone }));
    (p.progress?.log || []).filter((l) => l.aligned).forEach((l) =>
      out.push({ ...base, section: "progressLog", itemId: l.id, primary: l.text, meta: l.date, done: !!l.alignDone }));
    if (p.progressAlign?.aligned)
      out.push({ ...base, section: "progressSummary", itemId: "summary", primary: `${p.progress?.percent ?? 0}% · ${p.progress?.status ?? ""}`, done: !!p.progressAlign.alignDone });
    (p.meetings || []).filter((m) => m.aligned).forEach((m) =>
      out.push({ ...base, section: "meetings", itemId: m.id, primary: m.title, secondary: m.person ? `con ${m.person}` : "", meta: m.date, done: !!m.alignDone }));
    if (p.notesAlign?.aligned)
      out.push({ ...base, section: "notes", itemId: "notes", primary: p.notes || "(notas vacías)", done: !!p.notesAlign.alignDone });
    (p.links || []).filter((l) => l.aligned).forEach((l) =>
      out.push({ ...base, section: "links", itemId: l.id, primary: l.label, meta: l.url, done: !!l.alignDone }));
    (p.decisions || []).filter((d) => d.aligned).forEach((d) =>
      out.push({ ...base, section: "decisions", itemId: d.id, primary: d.decision, secondary: d.rationale, meta: d.date, done: !!d.alignDone }));
    (p.nextSteps || []).filter((n) => n.aligned).forEach((n) =>
      out.push({ ...base, section: "nextSteps", itemId: n.id, primary: n.text, done: !!n.alignDone }));
    (p.risks || []).filter((r) => r.aligned).forEach((r) =>
      out.push({ ...base, section: "risks", itemId: r.id, primary: r.text, secondary: r.mitigation, level: r.level, done: !!r.alignDone }));
  }
  return out;
}

function newProject(name, sections, accent) {
  return {
    id: uid(),
    name: name.trim() || "Sin título",
    accent,
    createdAt: Date.now(),
    sections: { ...DEFAULT_SECTIONS, ...sections },
    tasks: [],
    progress: { percent: 0, status: "Sin empezar", log: [] },
    meetings: [],
    notes: "",
    links: [],
    decisions: [],
    nextSteps: [],
    risks: [],
  };
}

const DEFAULT_SECTIONS = { tasks: false, progress: false, meetings: false, notes: false, links: false, decisions: false, nextSteps: false, risks: false };

/* ----------------------------- storage ---------------------------- */
async function loadData() {
  try {
    if (typeof window !== "undefined" && window.storage) {
      const res = await window.storage.get(STORAGE_KEY);
      if (res && res.value) return normalize(JSON.parse(res.value));
    }
  } catch (e) { /* first run or unavailable */ }
  return { projects: [] };
}

// Asegura que proyectos guardados antes de añadir campos nuevos sigan funcionando
function normalize(data) {
  if (!data || !Array.isArray(data.projects)) return { projects: [] };
  return {
    ...data,
    projects: data.projects.map((p) => ({
      ...p,
      risks: Array.isArray(p.risks) ? p.risks : [],
      sections: { risks: false, ...(p.sections || {}) },
      tasks: (p.tasks || []).map((t) => ({ level: "M", ...t })),
    })),
  };
}
async function saveData(data) {
  if (typeof window !== "undefined" && window.storage) {
    await window.storage.set(STORAGE_KEY, JSON.stringify(data));
  }
}

/* =================================================================== */
export default function App() {
  const [data, setData] = useState({ projects: [] });
  const [selectedId, setSelectedId] = useState(null);
  const [view, setView] = useState("home"); // "home" | "project" | "align" | "search"
  const [query, setQuery] = useState("");
  const [focus, setFocus] = useState(null); // { key, ts } para resaltar una sección
  const [loading, setLoading] = useState(true);
  const [creating, setCreating] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [syncState, setSyncState] = useState("idle"); // idle | saving | error
  const [toast, setToast] = useState(null);
  const loadedRef = useRef(false);
  const saveTimer = useRef(null);

  const notify = useCallback((msg) => setToast({ msg, id: Date.now() }), []);
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2200);
    return () => clearTimeout(t);
  }, [toast]);

  useEffect(() => {
    loadData().then((d) => {
      setData(d);
      if (d.projects.length) setSelectedId(d.projects[0].id);
      setLoading(false);
      loadedRef.current = true;
    });
  }, []);

  // debounced persistence
  useEffect(() => {
    if (!loadedRef.current) return;
    setSyncState("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      saveData(data)
        .then(() => setSyncState("idle"))
        .catch(() => setSyncState("error"));
    }, 450);
    return () => clearTimeout(saveTimer.current);
  }, [data]);

  const project = data.projects.find((p) => p.id === selectedId) || null;

  const patchProject = useCallback((id, patch) => {
    setData((d) => ({
      ...d,
      projects: d.projects.map((p) =>
        p.id === id ? { ...p, ...(typeof patch === "function" ? patch(p) : patch) } : p
      ),
    }));
  }, []);

  const addProject = (name, sections) => {
    const accent = ACCENTS[data.projects.length % ACCENTS.length];
    const np = newProject(name, sections, accent);
    setData((d) => ({ ...d, projects: [...d.projects, np] }));
    setSelectedId(np.id);
    setView("project");
    setCreating(false);
    setSidebarOpen(false);
  };

  const deleteProject = (id) => {
    setData((d) => {
      const projects = d.projects.filter((p) => p.id !== id);
      if (id === selectedId) setSelectedId(projects[0]?.id ?? null);
      return { ...d, projects };
    });
  };

  const fileInputRef = useRef(null);

  // Abre un work stream; si se indica sección, la activa (si estaba oculta) y la resalta
  const openProject = (pid, section = null) => {
    setSelectedId(pid);
    setView("project");
    setSidebarOpen(false);
    if (section) {
      patchProject(pid, (p) => (p.sections?.[section] ? {} : { sections: { ...p.sections, [section]: true } }));
      setFocus({ key: section, ts: Date.now() });
    } else {
      setFocus(null);
    }
  };

  const exportData = () => {
    try {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `seguimiento-backup-${today()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      notify("Datos exportados");
    } catch (e) {
      notify("No se pudo exportar");
    }
  };

  const importData = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        const clean = normalize(parsed);
        if (!Array.isArray(clean.projects)) throw new Error("formato");
        if (!confirm(`Importar ${clean.projects.length} work stream(s)? Esto reemplazará todos tus datos actuales.`)) return;
        setData(clean);
        setSelectedId(clean.projects[0]?.id ?? null);
        setView("home");
        notify("Datos importados");
      } catch (e) {
        notify("Archivo no válido");
      }
    };
    reader.onerror = () => notify("No se pudo leer el archivo");
    reader.readAsText(file);
  };

  // Cambia banderas de alineación de cualquier elemento, en cualquier sección
  const setItemAlign = useCallback((projectId, section, itemId, field, value) => {
    const mapList = (arr) => arr.map((it) => it.id === itemId ? { ...it, [field]: value } : it);
    patchProject(projectId, (p) => {
      switch (section) {
        case "tasks": return { tasks: mapList(p.tasks) };
        case "meetings": return { meetings: mapList(p.meetings) };
        case "links": return { links: mapList(p.links) };
        case "decisions": return { decisions: mapList(p.decisions) };
        case "nextSteps": return { nextSteps: mapList(p.nextSteps) };
        case "risks": return { risks: mapList(p.risks) };
        case "progressLog": return { progress: { ...p.progress, log: mapList(p.progress.log) } };
        case "progressSummary": return { progressAlign: { ...(p.progressAlign || {}), [field]: value } };
        case "notes": return { notesAlign: { ...(p.notesAlign || {}), [field]: value } };
        default: return {};
      }
    });
  }, [patchProject]);

  const alignedPoints = collectAligned(data.projects);
  const openCount = alignedPoints.filter((a) => !a.done).length;

  return (
    <ToastContext.Provider value={notify}>
    <div style={S.root}>
      <StyleTag />

      {/* mobile top bar */}
      <div style={S.mobileBar} className="pt-mobilebar">
        <button style={S.iconBtn} onClick={() => setSidebarOpen(true)} aria-label="Abrir proyectos">
          <Menu size={20} />
        </button>
        <span style={{ fontFamily: "Fraunces, serif", fontWeight: 600, fontSize: 17 }}>
          {view === "search" ? "Buscar" : view === "home" ? "Home" : view === "align" ? "Align with Maxine" : project ? project.name : "Mis work streams"}
        </span>
        <SyncDot state={syncState} />
      </div>

      {/* backdrop for mobile sidebar */}
      {sidebarOpen && <div style={S.backdrop} onClick={() => setSidebarOpen(false)} />}

      {/* SIDEBAR */}
      <aside
        style={{ ...S.sidebar, ...(sidebarOpen ? S.sidebarOpen : null) }}
        className="pt-sidebar"
      >
        <div style={S.brand}>
          <div style={S.brandMark}><FolderOpen size={18} /></div>
          <div>
            <div style={{ fontFamily: "Fraunces, serif", fontWeight: 600, fontSize: 19, lineHeight: 1 }}>Seguimiento</div>
            <div style={{ fontSize: 11.5, color: "var(--muted)", letterSpacing: ".04em", marginTop: 3 }}>
              {data.projects.length} work stream{data.projects.length === 1 ? "" : "s"}
            </div>
          </div>
          <button style={{ ...S.iconBtn, marginLeft: "auto" }} className="pt-closebtn" onClick={() => setSidebarOpen(false)}>
            <X size={18} />
          </button>
        </div>

        <div style={S.searchWrap}>
          <Search size={15} color="var(--muted)" style={{ flex: "0 0 auto" }} />
          <input
            value={query}
            onChange={(e) => {
              const v = e.target.value;
              setQuery(v);
              if (v.trim()) setView("search");
              else if (view === "search") setView("home");
            }}
            placeholder="Buscar en todo…"
            style={S.searchInput}
          />
          {query && (
            <button style={{ ...S.iconBtn, padding: 0 }} onClick={() => { setQuery(""); if (view === "search") setView("home"); }}>
              <X size={15} />
            </button>
          )}
        </div>

        <button style={S.newBtn} onClick={() => { setCreating(true); setSidebarOpen(false); }}>
          <Plus size={16} /> Nuevo
        </button>

        <button
          onClick={() => { setView("home"); setSidebarOpen(false); }}
          style={{ ...S.maxineTab, ...(view === "home" ? S.maxineTabActive : null) }}
        >
          <span style={{ ...S.maxineIcon, background: "rgba(47,111,122,.14)", color: "#2f6f7a" }}><HomeIcon size={15} /></span>
          <span style={{ flex: 1, textAlign: "left" }}>Home</span>
        </button>

        <button
          onClick={() => { setView("align"); setSidebarOpen(false); }}
          style={{ ...S.maxineTab, marginTop: 8, ...(view === "align" ? S.maxineTabActive : null) }}
        >
          <span style={S.maxineIcon}><Users size={15} /></span>
          <span style={{ flex: 1, textAlign: "left" }}>Align with Maxine</span>
          {openCount > 0 && <span style={S.countBadge}>{openCount}</span>}
        </button>

        <div style={S.listLabel}>WORK STREAMS</div>

        <div style={S.projectList}>
          {data.projects.length === 0 && !loading && (
            <p style={{ color: "var(--muted)", fontSize: 13.5, padding: "8px 4px", lineHeight: 1.5 }}>
              Aún no hay nada. Crea tu primer work stream.
            </p>
          )}
          {data.projects.map((p) => {
            const active = view === "project" && p.id === selectedId;
            return (
              <button
                key={p.id}
                onClick={() => openProject(p.id)}
                style={{ ...S.projItem, ...(active ? S.projItemActive : null) }}
              >
                <span style={{ ...S.dot, background: p.accent }} />
                <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {p.name}
                </span>
              </button>
            );
          })}
        </div>

        <div style={S.dataRow}>
          <button style={S.dataBtn} onClick={exportData}>
            <Download size={14} /> Export
          </button>
          <button style={S.dataBtn} onClick={() => fileInputRef.current?.click()}>
            <Upload size={14} /> Import
          </button>
          <input
            ref={fileInputRef} type="file" accept="application/json,.json"
            style={{ display: "none" }}
            onChange={(e) => { importData(e.target.files?.[0]); e.target.value = ""; }}
          />
        </div>

        <div style={S.syncRow}>
          <SyncDot state={syncState} />
          <span style={{ fontSize: 11.5, color: "var(--muted)" }}>
            {syncState === "error" ? "Error al guardar" : syncState === "saving" ? "Guardando…" : "Guardado"}
          </span>
        </div>
      </aside>

      {/* MAIN */}
      <main style={S.main} className="pt-main">
        {loading ? (
          <div style={S.empty}><p style={{ color: "var(--muted)" }}>Cargando…</p></div>
        ) : view === "search" ? (
          <SearchView
            projects={data.projects}
            query={query}
            onOpen={(pid, section) => openProject(pid, section)}
          />
        ) : view === "home" ? (
          <HomeView
            projects={data.projects}
            onOpen={(pid) => openProject(pid)}
            onCreate={() => setCreating(true)}
          />
        ) : view === "align" ? (
          <AlignView
            points={alignedPoints}
            agenda={data.alignNotes || ""}
            onAgenda={(v) => setData((d) => ({ ...d, alignNotes: v }))}
            onToggleDone={(pt) => setItemAlign(pt.projectId, pt.section, pt.itemId, "alignDone", !pt.done)}
            onUnalign={(pt) => setItemAlign(pt.projectId, pt.section, pt.itemId, "aligned", false)}
            onOpenProject={(pid) => openProject(pid)}
          />
        ) : !project ? (
          <EmptyState onCreate={() => setCreating(true)} />
        ) : (
          <ProjectView
            key={project.id}
            project={project}
            focus={focus}
            patch={(patch) => patchProject(project.id, patch)}
            onDelete={() => deleteProject(project.id)}
          />
        )}
      </main>

      {creating && (
        <CreateModal onClose={() => setCreating(false)} onCreate={addProject} />
      )}

      {toast && <Toast key={toast.id} msg={toast.msg} />}
    </div>
    </ToastContext.Provider>
  );
}

function ProjectView({ project, patch, onDelete, focus }) {
  const [editingName, setEditingName] = useState(false);
  const [nameDraft, setNameDraft] = useState(project.name);
  const [showSections, setShowSections] = useState(false);
  const [flash, setFlash] = useState(null);

  const toggleSection = (key) =>
    patch((p) => ({ sections: { ...p.sections, [key]: !p.sections[key] } }));

  const saveName = () => {
    patch({ name: nameDraft.trim() || "Sin título" });
    setEditingName(false);
  };

  const activeSections = SECTIONS.filter((s) => project.sections[s.key]);

  // Al llegar desde una búsqueda: desplazar a la sección y resaltarla
  useEffect(() => {
    if (!focus?.key) return;
    const el = document.getElementById("sec-" + focus.key);
    if (el) {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      setFlash(focus.key);
      const t = setTimeout(() => setFlash(null), 1700);
      return () => clearTimeout(t);
    }
  }, [focus]);

  return (
    <div style={S.projectView} className="pt-fadein">
      {/* header */}
      <div style={S.projHeader}>
        <span style={{ ...S.dot, background: project.accent, width: 12, height: 12 }} />
        {editingName ? (
          <input
            autoFocus value={nameDraft}
            onChange={(e) => setNameDraft(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") saveName(); if (e.key === "Escape") setEditingName(false); }}
            onBlur={saveName}
            style={{ ...S.input, fontFamily: "Fraunces, serif", fontSize: 26, fontWeight: 600, padding: "2px 8px", maxWidth: 460 }}
          />
        ) : (
          <h1
            style={S.projTitle}
            onClick={() => { setNameDraft(project.name); setEditingName(true); }}
            title="Clic para renombrar"
          >
            {project.name}
            <Pencil size={15} style={{ marginLeft: 10, opacity: 0.35, verticalAlign: "middle" }} />
          </h1>
        )}

        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button style={S.ghostBtn} onClick={() => setShowSections((v) => !v)}>
            <SlidersHorizontal size={15} /> Secciones
          </button>
          <button
            style={{ ...S.ghostBtn, color: "#c0392b" }}
            onClick={() => { if (confirm(`¿Eliminar "${project.name}"? No se puede deshacer.`)) onDelete(); }}
          >
            <Trash2 size={15} />
          </button>
        </div>
      </div>

      {/* section toggles */}
      {showSections && (
        <div style={S.sectionToggles} className="pt-fadein">
          {SECTIONS.map((s) => {
            const on = project.sections[s.key];
            const Icon = s.icon;
            return (
              <button
                key={s.key}
                onClick={() => toggleSection(s.key)}
                style={{ ...S.chip, ...(on ? { ...S.chipOn, borderColor: project.accent, color: project.accent } : null) }}
              >
                <Icon size={14} /> {s.label}
                {on && <Check size={13} style={{ marginLeft: 2 }} />}
              </button>
            );
          })}
        </div>
      )}

      {/* sections */}
      {activeSections.length === 0 ? (
        <div style={{ ...S.card, textAlign: "center", color: "var(--muted)" }}>
          No hay secciones activas. Pulsa <b>Secciones</b> para activar alguna.
        </div>
      ) : (
        <div style={S.sectionGrid}>
          {activeSections.map((s) => (
            <SectionCard key={s.key} meta={s} project={project} patch={patch} flash={flash === s.key} />
          ))}
        </div>
      )}
    </div>
  );
}

function SectionCard({ meta, project, patch, flash }) {
  const Icon = meta.icon;
  const bodies = {

}

/* -------- align-with-Maxine flag toggle -------- */
function AlignToggle({ active, onClick }) {
  const notify = useContext(ToastContext);
  const handle = () => {
    onClick();
    if (!active && notify) notify("Añadido a Align with Maxine");
  };
  return (
    <button
      onClick={handle}
      title={active ? "Quitar de Align with Maxine" : "Marcar para alinear con Maxine"}
      style={{ ...S.alignToggle, ...(active ? S.alignToggleOn : null) }}
    >
      <Flag size={13} fill={active ? "currentColor" : "none"} />
    </button>
  );
}
function TasksBody({ project, patch }) {
  const tasks = project.tasks;
  const [draft, setDraft] = useState("");
  const [draftLevel, setDraftLevel] = useState("M");
  const [draftDue, setDraftDue] = useState("");

  const add = () => {
    if (!draft.trim()) return;
    patch((p) => ({ tasks: [...p.tasks, { id: uid(), text: draft.trim(), done: false, level: draftLevel, due: draftDue || "" }] }));
    setDraft(""); setDraftDue("");
  };
  const toggle = (id) => patch((p) => ({ tasks: p.tasks.map((t) => t.id === id ? { ...t, done: !t.done } : t) }));
  const setLevel = (id) => patch((p) => ({ tasks: p.tasks.map((t) => t.id === id ? { ...t, level: cycleLevel(t.level || "M") } : t) }));
  const setDue = (id, due) => patch((p) => ({ tasks: p.tasks.map((t) => t.id === id ? { ...t, due } : t) }));
  const toggleAlign = (id) => patch((p) => ({ tasks: p.tasks.map((t) => t.id === id ? { ...t, aligned: !t.aligned } : t) }));
  const del = (id) => patch((p) => ({ tasks: p.tasks.filter((t) => t.id !== id) }));
  const done = tasks.filter((t) => t.done).length;

  return (
    <div>
      {tasks.length > 0 && (
        <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 8 }}>{done}/{tasks.length} completadas</div>
      )}
      <ul style={S.list}>
        {tasks.map((t) => {
          const d = t.done ? null : daysUntil(t.due);
          const urgent = d !== null && d <= 3; // 3 días o menos, incluye vencidas
          return (
            <li key={t.id} style={{ ...S.listItem, ...(urgent ? S.taskUrgent : null) }}>
              <button style={S.checkBtn} onClick={() => toggle(t.id)}>
                {t.done ? <CheckCircle2 size={18} color={project.accent} /> : <Circle size={18} color={urgent ? "#c0392b" : "var(--line-strong)"} />}
              </button>
              <LevelBadge level={t.level || "M"} onClick={() => setLevel(t.id)} />
              <span style={{ flex: 1, textDecoration: t.done ? "line-through" : "none", color: t.done ? "var(--muted)" : urgent ? "#a52a1a" : "inherit", fontWeight: urgent ? 600 : 400 }}>
                {t.text}
              </span>
              <DueControl value={t.due} days={d} urgent={urgent} done={t.done} onChange={(v) => setDue(t.id, v)} />
              <AlignToggle active={t.aligned} onClick={() => toggleAlign(t.id)} />
              <button style={S.delBtn} onClick={() => del(t.id)}><X size={15} /></button>
            </li>
          );
        })}
      </ul>
      <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
        <LevelBadge level={draftLevel} onClick={() => setDraftLevel(cycleLevel(draftLevel))} title="Urgencia de la nueva tarea" />
        <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()}
          placeholder="Añadir tarea…" style={{ ...S.inputSm, minWidth: 120 }} />
        <input type="date" value={draftDue} onChange={(e) => setDraftDue(e.target.value)} title="Due date (opcional)"
          style={{ ...S.inputSm, flex: "0 0 auto", width: 138 }} />
        <button style={{ ...S.addMini, background: project.accent }} onClick={add}><Plus size={16} /></button>
      </div>
    </div>
  );
}

/* -------- due date control for a task -------- */
function DueControl({ value, days, urgent, done, onChange }) {
  const [editing, setEditing] = useState(false);
  if (editing) {
    return (
      <input
        type="date" autoFocus value={value || ""}
        onChange={(e) => onChange(e.target.value)}
        onBlur={() => setEditing(false)}
        style={{ ...S.inputSm, flex: "0 0 auto", width: 138, padding: "4px 6px", fontSize: 12.5 }}
      />
    );
  }
  if (!value) {
    return (
      <button style={S.dueAdd} onClick={() => setEditing(true)} title="Añadir due date">
        <CalendarDays size={13} />
      </button>
    );
  }
  let label;
  if (done) label = value.slice(5);
  else if (days < 0) label = `${Math.abs(days)}d tarde`;
  else if (days === 0) label = "hoy";
  else if (days === 1) label = "mañana";
  else label = `${days}d`;
  return (
    <button
      onClick={() => setEditing(true)}
      title={`Due: ${value}`}
      style={{ ...S.dueTag, ...(urgent ? S.dueTagUrgent : null) }}
    >
      <CalendarDays size={12} /> {label}
    </button>
  );
}

/* -------- Progress -------- */
function ProgressBody({ project, patch }) {
  const pr = project.progress;
  const setPercent = (n) => patch((p) => ({ progress: { ...p.progress, percent: n } }));
  const setStatus = (s) => patch((p) => ({ progress: { ...p.progress, status: s } }));
  const addLog = (text) => patch((p) => ({ progress: { ...p.progress, log: [{ id: uid(), date: today(), text }, ...p.progress.log] } }));
  const delLog = (id) => patch((p) => ({ progress: { ...p.progress, log: p.progress.log.filter((l) => l.id !== id) } }));
  const alignLog = (id) => patch((p) => ({ progress: { ...p.progress, log: p.progress.log.map((l) => l.id === id ? { ...l, aligned: !l.aligned } : l) } }));
  const alignSummary = () => patch((p) => ({ progressAlign: { ...(p.progressAlign || {}), aligned: !p.progressAlign?.aligned } }));
  return (
    <div>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}>
        <span style={{ fontFamily: "Fraunces, serif", fontSize: 30, fontWeight: 600, color: project.accent }}>{pr.percent}%</span>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <AlignToggle active={project.progressAlign?.aligned} onClick={alignSummary} />
          <select value={pr.status} onChange={(e) => setStatus(e.target.value)} style={S.select}>
            {STATUSES.map((s) => <option key={s}>{s}</option>)}
          </select>
        </div>
      </div>
      <input type="range" min="0" max="100" step="5" value={pr.percent}
        onChange={(e) => setPercent(Number(e.target.value))}
        style={{ width: "100%", marginTop: 12, accentColor: project.accent }} />
      <div style={{ fontSize: 12, color: "var(--muted)", margin: "14px 0 6px", fontWeight: 600, letterSpacing: ".03em" }}>REGISTRO</div>
      <ul style={S.list}>
        {pr.log.map((l) => (
          <li key={l.id} style={S.listItem}>
            <span style={S.dateTag}>{l.date.slice(5)}</span>
            <span style={{ flex: 1 }}>{l.text}</span>
            <AlignToggle active={l.aligned} onClick={() => alignLog(l.id)} />
            <button style={S.delBtn} onClick={() => delLog(l.id)}><X size={15} /></button>
          </li>
        ))}
      </ul>
      <AddRow placeholder="Qué avanzó hoy…" onAdd={addLog} accent={project.accent} />
    </div>
  );
}

/* -------- Risks -------- */
function RisksBody({ project, patch }) {
  const risks = project.risks;
  const [text, setText] = useState("");
  const [level, setLevel] = useState("M");
  const [mitigation, setMitigation] = useState("");

  const add = () => {
    if (!text.trim()) return;
    patch((p) => ({ risks: [{ id: uid(), text: text.trim(), level, mitigation: mitigation.trim(), resolved: false }, ...p.risks] }));
    setText(""); setMitigation(""); setLevel("M");
  };
  const cycle = (id) => patch((p) => ({ risks: p.risks.map((r) => r.id === id ? { ...r, level: cycleLevel(r.level || "M") } : r) }));
  const toggle = (id) => patch((p) => ({ risks: p.risks.map((r) => r.id === id ? { ...r, resolved: !r.resolved } : r) }));
  const del = (id) => patch((p) => ({ risks: p.risks.filter((r) => r.id !== id) }));
  const alignR = (id) => patch((p) => ({ risks: p.risks.map((r) => r.id === id ? { ...r, aligned: !r.aligned } : r) }));

  // ordena por severidad (H > M > L), los resueltos al final
  const order = { H: 0, M: 1, L: 2 };
  const sorted = [...risks].sort((a, b) =>
    (a.resolved - b.resolved) || (order[a.level] - order[b.level])
  );

  return (
    <div>
      <ul style={{ ...S.list, gap: 8 }}>
        {sorted.map((r) => (
          <li key={r.id} style={{ ...S.riskItem, opacity: r.resolved ? 0.55 : 1 }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 9 }}>
              <LevelBadge level={r.level || "M"} onClick={() => cycle(r.id)} title="Cambiar impacto (H/M/L)" />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, textDecoration: r.resolved ? "line-through" : "none", overflowWrap: "anywhere" }}>{r.text}</div>
                {r.mitigation && (
                  <div style={{ fontSize: 13, color: "var(--muted)", marginTop: 3, lineHeight: 1.45, overflowWrap: "anywhere" }}>
                    <span style={{ fontWeight: 600 }}>Mitigación: </span>{r.mitigation}
                  </div>
                )}
              </div>
              <button style={S.checkBtn} onClick={() => toggle(r.id)} title={r.resolved ? "Reabrir" : "Marcar mitigado"}>
                {r.resolved ? <CheckCircle2 size={18} color={project.accent} /> : <Circle size={18} color="var(--line-strong)" />}
              </button>
              <AlignToggle active={r.aligned} onClick={() => alignR(r.id)} />
              <button style={S.delBtn} onClick={() => del(r.id)}><X size={15} /></button>
            </div>
          </li>
        ))}
      </ul>
      <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
        <LevelBadge level={level} onClick={() => setLevel(cycleLevel(level))} title="Impacto del riesgo" />
        <input value={text} onChange={(e) => setText(e.target.value)} placeholder="Riesgo…" style={S.inputSm} />
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        <input value={mitigation} onChange={(e) => setMitigation(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()}
          placeholder="Mitigación (opcional)…" style={S.inputSm} />
        <button style={{ ...S.addMini, background: project.accent }} onClick={add}><Plus size={16} /></button>
      </div>
    </div>
  );
}

/* ============================ Búsqueda global ============================ */
const SEARCH_KIND = {
  name: "Work stream", tasks: "Current Task", nextSteps: "Future Task",
  meetings: "Meeting", notes: "Notes", links: "Link",
  decisions: "Decision", risks: "Risk", progress: "Progress",
};
const SEARCH_ICON = {
  name: FolderOpen, tasks: ListChecks, nextSteps: ArrowRight, meetings: CalendarDays,
  notes: StickyNote, links: Link2, decisions: Lightbulb, risks: AlertTriangle, progress: BarChart3,
};

function snippet(text, q, len = 110) {
  if (!text) return "";
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0 || text.length <= len) return text;
  const start = Math.max(0, i - 30);
  const end = Math.min(text.length, start + len);
  return (start > 0 ? "…" : "") + text.slice(start, end).trim() + (end < text.length ? "…" : "");
}

function Highlight({ text, q }) {
  if (!q) return <>{text}</>;
  const lower = text.toLowerCase(), ql = q.toLowerCase();
  const parts = []; let i = 0, idx;
  while ((idx = lower.indexOf(ql, i)) !== -1) {
    if (idx > i) parts.push(text.slice(i, idx));
    parts.push(<mark key={idx} style={{ background: "rgba(176,74,47,.22)", color: "inherit", borderRadius: 3, padding: "0 1px" }}>{text.slice(idx, idx + q.length)}</mark>);
    i = idx + q.length;
  }
  if (i < text.length) parts.push(text.slice(i));
  return <>{parts}</>;
}

function searchProjects(projects, q) {
  const ql = q.toLowerCase();
  const hit = (s) => s && s.toLowerCase().includes(ql);
  const out = [];
  for (const p of projects) {
    const base = { projectId: p.id, projectName: p.name, accent: p.accent };
    if (hit(p.name)) out.push({ ...base, section: "name", text: p.name });
    (p.tasks || []).forEach((t) => hit(t.text) && out.push({ ...base, section: "tasks", text: t.text }));
    (p.nextSteps || []).forEach((t) => hit(t.text) && out.push({ ...base, section: "nextSteps", text: t.text }));
    (p.meetings || []).forEach((m) => {
      if (hit(m.title) || hit(m.person) || hit(m.notes))
        out.push({ ...base, section: "meetings", text: m.title + (m.person ? ` · con ${m.person}` : ""), extra: hit(m.notes) ? m.notes : "" });
    });
    if (hit(p.notes)) out.push({ ...base, section: "notes", text: p.notes });
    (p.links || []).forEach((l) => (hit(l.label) || hit(l.url)) && out.push({ ...base, section: "links", text: l.label, extra: l.url }));
    (p.decisions || []).forEach((d) => (hit(d.decision) || hit(d.rationale)) && out.push({ ...base, section: "decisions", text: d.decision, extra: hit(d.rationale) ? d.rationale : "" }));
    (p.risks || []).forEach((r) => (hit(r.text) || hit(r.mitigation)) && out.push({ ...base, section: "risks", text: r.text, extra: hit(r.mitigation) ? r.mitigation : "" }));
    (p.progress?.log || []).forEach((l) => hit(l.text) && out.push({ ...base, section: "progress", text: l.text }));
  }
  return out;
}

function SearchView({ projects, query, onOpen }) {
  const q = query.trim();
  const results = q ? searchProjects(projects, q) : [];

  // agrupar por proyecto
  const groups = [];
  const byId = {};
  for (const r of results) {
    if (!byId[r.projectId]) { byId[r.projectId] = { ...r, items: [] }; groups.push(byId[r.projectId]); }
    byId[r.projectId].items.push(r);
  }

  return (
    <div style={{ maxWidth: 820, margin: "0 auto" }} className="pt-fadein">
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <span style={{ ...S.maxineHeadIcon, background: "rgba(138,125,108,.16)", color: "var(--muted)" }}><Search size={20} /></span>
        <h1 style={{ fontFamily: "Fraunces, serif", fontSize: 28, fontWeight: 600, margin: 0, letterSpacing: "-.015em" }}>Buscar</h1>
      </div>
      <p style={{ color: "var(--muted)", marginBottom: 22 }}>
        {!q ? "Escribe en el buscador de la izquierda." : `${results.length} resultado${results.length === 1 ? "" : "s"} para “${q}”.`}
      </p>

      {q && results.length === 0 && (
        <div style={{ ...S.empty, paddingTop: 40 }}>
          <p style={{ color: "var(--muted)" }}>Nada coincide con “{q}”.</p>
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
        {groups.map((g) => (
          <div key={g.projectId}>
            <button onClick={() => onOpen(g.projectId)} style={S.alignGroupHead}>
              <span style={{ ...S.dot, background: g.accent }} />
              {g.projectName}
              <span style={{ fontSize: 12, color: "var(--muted)", fontWeight: 400 }}>· {g.items.length}</span>
            </button>
            <div style={S.card}>
              {g.items.map((r, i) => {
                const Icon = SEARCH_ICON[r.section];
                return (
                  <button key={i} style={{ ...S.homeRow, alignItems: "flex-start" }} className="pt-homerow" onClick={() => onOpen(r.projectId, r.section === "name" ? null : r.section)}>
                    <span style={{ ...S.alignKind, marginTop: 2 }}><Icon size={12} /> {SEARCH_KIND[r.section]}</span>
                    <span style={{ flex: 1, minWidth: 0, textAlign: "left" }}>
                      <span style={{ display: "block", overflowWrap: "anywhere" }}>
                        <Highlight text={snippet(r.text, q)} q={q} />
                      </span>
                      {r.extra && (
                        <span style={{ display: "block", fontSize: 12.5, color: "var(--muted)", marginTop: 2, overflowWrap: "anywhere" }}>
                          <Highlight text={snippet(r.extra, q)} q={q} />
                        </span>
                      )}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================ Home ============================ */
function homeDayLabel(d) {
  if (d < 0) return `${Math.abs(d)}d tarde`;
  if (d === 0) return "hoy";
  if (d === 1) return "mañana";
  return `en ${d}d`;
}

function HomeView({ projects, onOpen, onCreate }) {
  const urgentTasks = [], meetings = [], highRisks = [];
  for (const p of projects) {
    const base = { projectId: p.id, projectName: p.name, accent: p.accent };
    for (const t of p.tasks || []) {
      if (t.done || !t.due) continue;
      const d = daysUntil(t.due);
      if (d !== null && d <= 7) urgentTasks.push({ ...base, id: t.id, text: t.text, level: t.level, due: t.due, days: d });
    }
    for (const m of p.meetings || []) {
      const d = daysUntil(m.date);
      if (d !== null && d >= 0) meetings.push({ ...base, id: m.id, title: m.title, person: m.person, date: m.date, days: d });
    }
    for (const r of p.risks || []) {
      if (!r.resolved && (r.level || "M") === "H") highRisks.push({ ...base, id: r.id, text: r.text, mitigation: r.mitigation });
    }
  }
  urgentTasks.sort((a, b) => a.days - b.days);
  meetings.sort((a, b) => a.days - b.days);

  if (projects.length === 0) {
    return (
      <div style={S.empty}>
        <div style={S.emptyArt}><HomeIcon size={28} /></div>
        <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 26, margin: "18px 0 6px" }}>Bienvenida</h2>
        <p style={{ color: "var(--muted)", maxWidth: 360, lineHeight: 1.6, marginBottom: 22 }}>
          Crea tu primer work stream y aquí verás de un vistazo lo urgente de todos: tareas, reuniones y riesgos.
        </p>
        <button style={S.bigBtn} onClick={onCreate}><Plus size={17} /> Crear work stream</button>
      </div>
    );

  const StreamPill = ({ pt }) => (
    <span style={S.streamPill}><span style={{ ...S.dot, background: pt.accent, width: 7, height: 7 }} />{pt.projectName}</span>
  );

  return (
    <div style={{ maxWidth: 880, margin: "0 auto" }} className="pt-fadein">
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <span style={{ ...S.maxineHeadIcon, background: "rgba(47,111,122,.14)", color: "#2f6f7a" }}><HomeIcon size={20} /></span>
        <h1 style={{ fontFamily: "Fraunces, serif", fontSize: 30, fontWeight: 600, margin: 0, letterSpacing: "-.015em" }}>Home</h1>
      </div>
      <p style={{ color: "var(--muted)", marginBottom: 24, lineHeight: 1.55 }}>
        {urgentTasks.length} tarea{urgentTasks.length === 1 ? "" : "s"} urgente{urgentTasks.length === 1 ? "" : "s"} · {meetings.length} próxima{meetings.length === 1 ? "" : "s"} reunión{meetings.length === 1 ? "" : "es"} · {highRisks.length} riesgo{highRisks.length === 1 ? "" : "s"} alto{highRisks.length === 1 ? "" : "s"}
      </p>

      <div style={S.homeGrid}>
        {/* Tareas urgentes */}
        <section style={S.card}>
          <div style={S.cardHead}>
            <span style={{ color: "#b3331f" }}><ListChecks size={16} /></span>
            <h3 style={S.cardTitle}>Tareas urgentes</h3>
            <span style={S.homeCount}>{urgentTasks.length}</span>
          </div>
          {urgentTasks.length === 0 ? (
            <p style={S.homeEmpty}>Nada vencido ni para esta semana.</p>
          ) : (
            <div>
              {urgentTasks.map((t) => {
                const urgent = t.days <= 3;
                return (
                  <button key={t.projectId + t.id} style={S.homeRow} className="pt-homerow" onClick={() => onOpen(t.projectId)}>
                    {t.level && <LevelBadgeInline level={t.level} />}
                    <span style={{ flex: 1, textAlign: "left", minWidth: 0 }}>
                      <span style={{ display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.text}</span>
                      <StreamPill pt={t} />
                    </span>
                    <span style={{ ...S.dueTag, ...(urgent ? S.dueTagUrgent : null) }}>
                      <CalendarDays size={12} /> {homeDayLabel(t.days)}

  );
}

// Construye un texto plano con los puntos ABIERTOS, agrupados por work stream
function buildExport(groups, agenda) {
  const lines = [`Align with Maxine — ${today()}`, ""];
  if (agenda && agenda.trim()) {
    lines.push("AGENDA / NOTAS", agenda.trim(), "");
  }
  for (const g of groups) {
    const open = g.items.filter((it) => !it.done);
    if (!open.length) continue;
    lines.push(`## ${g.projectName}`);
    for (const it of open) {
      let l = `- [${ALIGN_LABEL[it.section]}] `;
      if (it.level) l += `(${it.level}) `;
      l += it.primary;
      if (it.secondary) l += ` — ${it.secondary}`;
      if (it.section === "meetings" && it.meta) l += ` (${it.meta})`;
      if (it.section === "tasks" && it.due) l += ` (vence: ${it.due})`;
      if (it.section === "links" && it.meta) l += ` (${it.meta})`;
      lines.push(l);
    }
    lines.push("");
  }
  return lines.join("\n").trim();
}

function ExportModal({ text, onClose }) {
  const [copied, setCopied] = useState(false);
  const ref = useRef(null);
  const copy = async () => {
    try {
      if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(text);
      else { ref.current?.select(); document.execCommand("copy"); }
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch (e) {
      ref.current?.select();
    }
  };
  return (
    <div style={S.modalWrap} onClick={onClose}>
      <div style={{ ...S.modal, maxWidth: 560 }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", alignItems: "center", marginBottom: 14 }}>
          <h3 style={{ fontFamily: "Fraunces, serif", fontSize: 22, margin: 0 }}>Exportar para Maxine</h3>
          <button style={{ ...S.iconBtn, marginLeft: "auto" }} onClick={onClose}><X size={18} /></button>
        </div>
        <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 12, lineHeight: 1.5 }}>
          Solo los puntos abiertos (sin marcar como tratados). Cópialo y pégalo en un email o mensaje.
        </p>
        <textarea ref={ref} readOnly value={text} onFocus={(e) => e.target.select()}
          style={{ ...S.notesArea, height: 280, fontFamily: "ui-monospace, monospace", fontSize: 12.5 }} />
        <button style={{ ...S.bigBtn, width: "100%", marginTop: 16 }} onClick={copy}>
          {copied ? <><Check size={16} /> Copiado</> : <><Copy size={16} /> Copiar al portapapeles</>}
        </button>
      </div>
    </div>
  );
}
